<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Task</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h1 class="text-center mb-4">Edit Task</h1>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Task Title</label>
                <input type="text" name="title" class="form-control" value="{{ task[1] }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Task Description</label>
                <input type="text" name="description" class="form-control" value="{{ task[2] }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select">
                    <option value="Low" {% if task[3] == "Low" %}selected{% endif %}>Low</option>
                    <option value="Medium" {% if task[3] == "Medium" %}selected{% endif %}>Medium</option>
                    <option value="High" {% if task[3] == "High" %}selected{% endif %}>High</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Deadline</label>
                <input type="date" name="deadline" class="form-control" value="{{ task[4] }}">
            </div>

            <button type="submit" class="btn btn-primary">Update Task</button>
            <a href="/" class="btn btn-secondary">Back</a>

        </form>
    </div>
</div>

</body>
</html>
